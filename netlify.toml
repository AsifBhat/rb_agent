[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/create-session"
  to = "/.netlify/functions/create-session"
  status = 200

[[redirects]]
  from = "/api/thread-items"
  to = "/.netlify/functions/thread-items"
  status = 200

[[redirects]]
  from = "/api/list-threads"
  to = "/.netlify/functions/list-threads"
  status = 200

[[redirects]]
  from = "/api/visualize"
  to = "/.netlify/functions/visualize"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
